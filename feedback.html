<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback | Kosko Labs</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="feedback-page">

    <nav>
        <div class="logo">
            <div class="logo-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 3h12M12 3v5M4.5 21h15M5.5 15.5l5-9.5h3l5 9.5a2 2 0 0 1-1.5 3h-10a2 2 0 0 1-1.5-3z"/>
                </svg>
            </div>
            KOSKO <span>LABS</span>
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            
            <div class="dropdown">
                <button class="dropdown-trigger">
                    Tools <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </button>
                <div class="dropdown-menu">
                    <a href="pdf-ninja.html">PDF Ninja Pro</a>
                    <a href="freezeframe.html">Freezeframe</a>
                </div>
            </div>

            <a href="feedback.html" class="active">Feedback</a>
        </div>
    </nav>

    <main>
        <div class="hero feedback-hero"> 
            <h1>Help Us Build <span class="highlight">Better Tools.</span></h1>
            <p>Spotted a bug? Have a feature request for PDF Ninja Pro or Freezeframe? Or an idea for a brand new utility? Drop it below.</p>
        </div>

        <div class="privacy-box">
            <div class="form-icon-wrapper">
                <i class="ri-chat-voice-line" style="color: var(--accent); font-size: 2.5rem;"></i>
            </div>

            <form action="https://formspree.io/f/xjgzvdbk" method="POST">                
                <div class="form-group">
                    <label for="email">Your Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="name@example.com">
                </div>

                <div class="form-group">
                    <label for="feedback-type">Type of Feedback</label>
                    <select id="feedback-type" name="feedback_type" required onchange="toggleProductDropdown()">
                        <option value="" disabled selected>Select feedback type...</option>
                        <option value="bug">Bug Report</option>
                        <option value="feature">Feature Request</option>
                        <option value="new-idea">New Product/Utility Idea</option>
                        <option value="general">General Inquiry</option>
                    </select>
                </div>

                <div id="product-group" class="form-group" style="display: none;">
                    <label for="product-select">Which Product?</label>
                    <select id="product-select" name="product_name">
                        <option value="pdf-ninja-pro">PDF Ninja Pro</option>
                        <option value="freezeframe">Freezeframe</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="5" required placeholder="Describe the issue or your idea in detail..."></textarea>
                </div>

                <button type="submit" class="btn-primary" style="border: none; cursor: pointer; width: 100%;">
                    Send Feedback
                </button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Kosko Labs. Crafted with focus and intent.</p>
    </footer>

    <script>
        function toggleProductDropdown() {
            const feedbackType = document.getElementById('feedback-type').value;
            const productGroup = document.getElementById('product-group');
            const productSelect = document.getElementById('product-select');

            if (feedbackType === 'bug' || feedbackType === 'feature') {
                productGroup.style.display = 'flex';
                productSelect.setAttribute('required', 'required');
            } else {
                productGroup.style.display = 'none';
                productSelect.removeAttribute('required');
            }
        }
    </script>
</body>
</html>
