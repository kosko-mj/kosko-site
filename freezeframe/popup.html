<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freezeframe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">FREEZEFRAME</div>
        <div class="status-block">
            <div id="tab-count">0 Tabs</div>
            <div id="ram-count">~0 MB RAM</div>
        </div>
    </header>

    <main>
        <button id="freeze-btn">Freeze Window</button>
        <p class="hint">Saves all tabs locally and clears browser memory.</p>
    </main>

    <section class="history-container">
        <h3>Saved Frames</h3>
        <ul id="history-list">
            </ul>
    </section>

    <script src="popup.js"></script>
</body>
</html>
